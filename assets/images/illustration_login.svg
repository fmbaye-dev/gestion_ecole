<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B3E"/>
      <stop offset="100%" style="stop-color:#1A3A8F"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6BB3F0"/>
      <stop offset="100%" style="stop-color:#4A90D9"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A843"/>
      <stop offset="100%" style="stop-color:#F0C866"/>
    </linearGradient>
    <linearGradient id="wall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6BB3F0" stop-opacity="0.55"/>
      <stop offset="100%" style="stop-color:#4A90D9" stop-opacity="0.40"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="14" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="blur1"><feGaussianBlur stdDeviation="32"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <rect width="480" height="320" fill="url(#bg)" rx="20"/>

  <!-- Atmosphere -->
  <circle cx="240" cy="320" r="180" fill="#4A90D9" opacity="0.07" filter="url(#blur1)"/>
  <circle cx="60"  cy="60"  r="90"  fill="#4A90D9" opacity="0.09" filter="url(#blur1)"/>
  <circle cx="420" cy="40"  r="80"  fill="#D4A843" opacity="0.07" filter="url(#blur1)"/>

  <!-- Stars -->
  <circle cx="48"  cy="48"  r="2.5" fill="#D4A843" opacity="0.55" filter="url(#glow)"/>
  <circle cx="430" cy="60"  r="2"   fill="#6BB3F0" opacity="0.5"  filter="url(#glow)"/>
  <circle cx="78"  cy="270" r="2"   fill="#D4A843" opacity="0.4"/>
  <circle cx="400" cy="240" r="1.5" fill="#6BB3F0" opacity="0.4"/>
  <circle cx="460" cy="150" r="2"   fill="#D4A843" opacity="0.3"/>

  <!-- BUILDING centred -->
  <g transform="translate(240,162)" filter="url(#shadow)">
    <!-- Side wings -->
    <rect x="-160" y="20"  width="60"  height="110" rx="4" fill="#4A90D9" opacity="0.22"/>
    <rect x="100"  y="20"  width="60"  height="110" rx="4" fill="#4A90D9" opacity="0.22"/>
    <rect x="-148" y="36"  width="18"  height="14"  rx="3" fill="white" opacity="0.13"/>
    <rect x="-122" y="36"  width="18"  height="14"  rx="3" fill="white" opacity="0.13"/>
    <rect x="104"  y="36"  width="18"  height="14"  rx="3" fill="white" opacity="0.13"/>
    <rect x="128"  y="36"  width="18"  height="14"  rx="3" fill="white" opacity="0.13"/>

    <!-- Main body -->
    <rect x="-100" y="-10" width="200" height="140" rx="5" fill="url(#wall)"/>

    <!-- Pediment -->
    <polygon points="-120,2 0,-90 120,2" fill="#4A90D9" opacity="0.45"/>
    <polygon points="-106,2 0,-76 106,2" fill="#6BB3F0" opacity="0.30"/>
    <polygon points="-40,-18 0,-52 40,-18" fill="white" opacity="0.09"/>

    <!-- Flag pole -->
    <rect x="-3" y="-112" width="6"  height="52" rx="3" fill="url(#gold)" opacity="0.85"/>
    <rect x="3"  y="-112" width="32" height="20" rx="3" fill="url(#gold)" opacity="0.80"/>

    <!-- Columns -->
    <rect x="-86" y="-8" width="14" height="138" rx="5" fill="white" opacity="0.14"/>
    <rect x="-52" y="-8" width="14" height="138" rx="5" fill="white" opacity="0.14"/>
    <rect x="-16" y="-8" width="14" height="138" rx="5" fill="white" opacity="0.14"/>
    <rect x="18"  y="-8" width="14" height="138" rx="5" fill="white" opacity="0.14"/>
    <rect x="52"  y="-8" width="14" height="138" rx="5" fill="white" opacity="0.14"/>
    <rect x="72"  y="-8" width="14" height="138" rx="5" fill="white" opacity="0.14"/>

    <!-- Windows -->
    <rect x="-78" y="18" width="32" height="26" rx="6" fill="white" opacity="0.18"/>
    <rect x="-28" y="18" width="32" height="26" rx="6" fill="white" opacity="0.18"/>
    <rect x="22"  y="18" width="32" height="26" rx="6" fill="white" opacity="0.18"/>
    <rect x="46"  y="18" width="32" height="26" rx="6" fill="white" opacity="0.18"/>
    <rect x="-72" y="23" width="10" height="7"  rx="2" fill="white" opacity="0.28"/>
    <rect x="-22" y="23" width="10" height="7"  rx="2" fill="white" opacity="0.28"/>
    <rect x="28"  y="23" width="10" height="7"  rx="2" fill="white" opacity="0.28"/>
    <rect x="52"  y="23" width="10" height="7"  rx="2" fill="white" opacity="0.28"/>

    <!-- Door -->
    <rect x="-26" y="68" width="52" height="62" rx="8" fill="#0D1B3E" opacity="0.65"/>
    <path d="M-26,96 Q-26,68 0,68 Q26,68 26,96" fill="#4A90D9" opacity="0.40"/>
    <rect x="-20" y="74" width="18" height="22" rx="3" fill="white" opacity="0.06"/>
    <rect x="2"   y="74" width="18" height="22" rx="3" fill="white" opacity="0.06"/>
    <circle cx="-4" cy="102" r="4" fill="url(#gold)" opacity="0.85"/>

    <!-- Steps -->
    <rect x="-110" y="128" width="220" height="8" rx="3" fill="white" opacity="0.16"/>
    <rect x="-122" y="134" width="244" height="8" rx="3" fill="white" opacity="0.10"/>
    <rect x="-136" y="140" width="272" height="8" rx="3" fill="white" opacity="0.07"/>

    <!-- Gold accent -->
    <rect x="-90" y="126" width="180" height="3" rx="1.5" fill="url(#gold)" opacity="0.55"/>

    <!-- Trees -->
    <rect x="-175" y="80" width="8"  height="50" rx="4" fill="#4A90D9" opacity="0.28"/>
    <circle cx="-171" cy="72" r="22" fill="#4A90D9" opacity="0.22"/>
    <circle cx="-171" cy="62" r="14" fill="#4A90D9" opacity="0.14"/>
    <rect x="167"  y="80" width="8"  height="50" rx="4" fill="#4A90D9" opacity="0.28"/>
    <circle cx="171"  cy="72" r="22" fill="#4A90D9" opacity="0.22"/>
    <circle cx="171"  cy="62" r="14" fill="#4A90D9" opacity="0.14"/>

    <line x1="-220" y1="148" x2="220" y2="148" stroke="white" stroke-width="1" opacity="0.08"/>
  </g>

  <ellipse cx="240" cy="306" rx="180" ry="18" fill="#4A90D9" opacity="0.10"/>
</svg>
